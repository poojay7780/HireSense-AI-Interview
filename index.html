</body>
<h1>🎤 HireSense AI</h1>

<h3>Select Course:</h3>
<select id="course">
  <option value="cs">Computer Science</option>
  <option value="web">Web Development</option>
  <option value="hr">HR Interview</option>
</select>

<div id="score">Score: 0</div>

<div id="question">Click Start to begin</div>

<textarea id="answer" placeholder="Type your answer..."></textarea><br>

<button onclick="startInterview()">Start</button>
<button onclick="submitAnswer()">Submit</button>
<button onclick="startVoice()">🎤 Speak</button>

<div id="result"></div>

<script>
let questionBank = {
  cs: [
    {q: "What is an Operating System?", keywords: ["manage","resource","hardware","software"]},
    {q: "What is a Data Structure?", keywords: ["organize","data","efficient"]},
    {q: "What is a Database?", keywords: ["store","data","manage"]},
    {q: "What is CPU scheduling?", keywords: ["process","cpu","execution"]}
  ],
  web: [
    {q: "What is HTML?", keywords: ["markup","web","structure"]},
    {q: "What is CSS?", keywords: ["style","design","layout"]},
    {q: "What is JavaScript?", keywords: ["scripting","dynamic","web"]},
    {q: "What is responsive design?", keywords: ["mobile","screen","adapt"]}
  ],
  hr: [
    {q: "Tell me about yourself.", keywords: ["student","skills","background"]},
    {q: "What are your strengths?", keywords: ["hardworking","team","skill"]},
    {q: "Why should we hire you?", keywords: ["skills","fit","company"]},
    {q: "Where do you see yourself in 5 years?", keywords: ["growth","career","future"]}
  ]
};

let currentQuestions = [];
let currentIndex = 0;
let totalScore = 0;
let maxScore = 0;

// Start Interview
function startInterview() {
  let course = document.getElementById("course").value;
  currentQuestions = questionBank[course];
  currentIndex = 0;
  totalScore = 0;
  maxScore = 0;
  updateScore();
  askQuestion();
}

// Ask Question
function askQuestion() {
  if(currentIndex < currentQuestions.length) {
    let q = currentQuestions[currentIndex].q;
    document.getElementById("question").innerText = q;
    speak(q);
  } else {
    document.getElementById("question").innerText = "🎉 Interview Completed!";
    document.getElementById("result").innerText =
      "Final Score: " + totalScore + "/" + maxScore;
  }
}

// Voice Output
function speak(text) {
  let speech = new SpeechSynthesisUtterance(text);
  speech.lang = "en-US";
  window.speechSynthesis.speak(speech);
}

// Submit Text
function submitAnswer() {
  let ans = document.getElementById("answer").value.toLowerCase();
  evaluate(ans);
}

// Voice Input
function startVoice() {
  let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "en-US";
  recognition.start();

  recognition.onresult = function(event) {
    let ans = event.results[0][0].transcript.toLowerCase();
    evaluate(ans);
  };
}

// Evaluate Answer
function evaluate(ans) {
  let keywords = currentQuestions[currentIndex].keywords;
  let score = 0;

  keywords.forEach(word => {
    if(ans.includes(word)) {
      score++;
    }
  });

  totalScore += score;
  maxScore += keywords.length;

  let feedback = "";
  if(score >= keywords.length - 1) {
    feedback = "✅ Good answer!";
  } else if(score >= 2) {
    feedback = "⚠️ Average answer.";
  } else {
    feedback = "❌ Poor answer.";
  }

  document.getElementById("result").innerText =
    "Your Answer: " + ans +
    "\nScore: " + score + "/" + keywords.length +
    "\n" + feedback;

  speak(feedback);
  updateScore();

  currentIndex++;

  setTimeout(() => {
    document.getElementById("answer").value = "";
    document.getElementById("result").innerText = "";
    askQuestion();
  }, 2500);
}

// Update Score Display
function updateScore() {
  document.getElementById("score").innerText =
    "Score: " + totalScore + "/" + maxScore;
}
</script>

</body>
</html>
